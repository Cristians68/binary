name: binary
description: "Binary Academy — IT certification prep with flashcards and quizzes."
publish_to: 'none'

version: 1.0.0+38

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.0
  cloud_firestore: ^5.4.4
  flutter_svg: ^2.0.10+1
  google_fonts: ^6.2.1
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.1
  shared_preferences: ^2.2.2
  purchases_flutter: ^9.16.1
  flutter_local_notifications: ^16.3.3
  timezone: ^0.9.0
  firebase_messaging: ^15.0.0
  url_launcher: ^6.3.0
  in_app_review: ^2.0.9
  share_plus: ^13.0.0
  flutter_jailbreak_detection: ^1.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
